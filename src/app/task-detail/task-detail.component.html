<div class="max-w-3xl mx-auto mt-10 p-8 bg-white rounded-xl shadow-lg border border-gray-100">
  <div class="mb-6">
    <button [routerLink]="['/list']" class="text-gray-500 hover:text-blue-600 flex items-center transition font-medium text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Quay lại danh sách
    </button>
  </div>

  @if (t) {
    <div class="border-b border-gray-200 pb-6 mb-6">
      <div class="flex items-center justify-between mb-2">
        <h1 class="text-3xl font-extrabold text-gray-900">{{t.title}}</h1>
        
        @if (t.status === 0) {
          <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-xs font-bold border border-gray-200">Chưa làm</span>
        } @else if (t.status === 1) {
          <span class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold border border-yellow-200">Đang làm</span>
        } @else if (t.status === 2) {
          <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold border border-green-200">Hoàn thành</span>
        }
      </div>
    </div>

    <div class="mb-8">
      <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Nội dung</h3>
      <p class="text-gray-700 leading-relaxed bg-gray-50 p-5 rounded-lg border border-gray-100 min-h-[100px]">
        {{t.content}}
      </p>
    </div>

    <div class="flex items-center space-x-3 mt-6">
      <button class="px-5 py-2 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-medium rounded-lg transition duration-200">
        Xóa công việc
      </button>
      
      @if (t.status !== 2) {
        @if (t.status === 0) {
          <button class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow transition duration-200">
            Bắt đầu thực hiện
          </button>
        } @else if (t.status === 1) {
          <button class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg shadow transition duration-200">
            Đánh dấu kết thúc
          </button>
        }
      }
    </div>
  } @else {
    <div class="flex justify-center items-center py-20 text-gray-500">
      <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      Đang tải thông tin công việc...
    </div>
  }
</div>
