<div class="max-w-2xl mx-auto mt-10 p-8 bg-white rounded-xl shadow-lg border border-gray-100">
  <h1 class="text-2xl font-extrabold text-gray-800 mb-6 border-b pb-4">Thêm mới công việc</h1>
  
  <form [formGroup]="newForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div>
      <label class="block text-gray-700 font-semibold mb-2 text-sm">Tiêu đề công việc</label>
      <input type="text" formControlName="title" 
             placeholder="Nhập tiêu đề..."
             class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" >
    </div>
    
    <div>
      <label class="block text-gray-700 font-semibold mb-2 text-sm">Nội dung chi tiết</label>
      <textarea formControlName="content" rows="4"
                placeholder="Mô tả công việc cần làm..."
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"></textarea>
    </div>
    
    <div class="flex justify-end space-x-4 pt-4">
      <button type="button" [routerLink]="['/list']" 
              class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg transition duration-200">
        Hủy
      </button>
      <button type="submit" 
              class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow transition duration-200">
        Lưu công việc
      </button>
    </div>
  </form>
</div>
